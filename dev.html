<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>App Pai - Teste do Board</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 8px; }
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }
    #theme-btn {
      padding: 6px 16px;
      font-size: 13px;
      font-family: inherit;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #f4f4f4;
      cursor: pointer;
    }
    #theme-btn:hover { background: #e8e8e8; }
    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: 2px solid #ccc;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>

  <div id="controls">
    <button id="theme-btn">Tema: light</button>
  </div>

  <!-- ✅ DEV: aponta pro index do Vite, NÃO pro dist -->
  <iframe id="board-frame" src="/index.html"></iframe>

  <script type="module">
    const iframe = document.getElementById("board-frame");
    const themeBtn = document.getElementById("theme-btn");

    const THEMES = ["light", "dark", "system"];
    let themeIndex = 0;
    let boardData = null;

    function sendData(themeMode) {
      if (!boardData) return;
      iframe.contentWindow.postMessage({
        type: "set-data",
        data: {
          ...boardData,
          settings: {
            config: {
              zoom: { x: 0, y: 0, k: 1 },
              theme: { mode: themeMode },
              collapsedAll: false,
            }
          }
        }
      }, "*");
    }

    themeBtn.addEventListener("click", () => {
      themeIndex = (themeIndex + 1) % THEMES.length;
      const theme = THEMES[themeIndex];
      themeBtn.textContent = `Tema: ${theme}`;
      sendData(theme);
    });

    async function loadAndSendData() {
      try {
        const response = await fetch("/data.json");
        const world = await response.json();

        const { timelines, storyLines, chapters, papers } = world;

        const paperColorMap = new Map(
          (papers || []).map(p => [p.id, p.color])
        );

        const coloredChapters = (chapters || []).map(ch => ({
          ...ch,
          color: paperColorMap.get(ch.paper_id) || "#CCCCCC"
        }));

        boardData = {
          timelines,
          storylines: storyLines,
          chapters: coloredChapters,
        };

        sendData(THEMES[themeIndex]);

      } catch (err) {
        console.error("❌ Erro ao carregar ou enviar dados:", err);
      }
    }

    iframe.addEventListener("load", () => {
      loadAndSendData();
    });

    window.addEventListener("message", (event) => {
      const { type, data } = event.data || {};
      if (!type) return;
      console.log("📨", type, data);
    });
  </script>

</body>
</html>
